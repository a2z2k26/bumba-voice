name: bumba

services:
  whisper:
    build:
      context: ./whisper
      dockerfile: Dockerfile.simple
    container_name: bumba-whisper
    ports:
    - 8880:8880
    volumes:
    - ./models/whisper:/models
    environment:
    - WHISPER_MODEL=base
    - WHISPER_THREADS=4
    restart: unless-stopped
    networks:
    - bumba-network
  kokoro:
    build:
      context: ./kokoro
      dockerfile: Dockerfile
    container_name: bumba-kokoro
    ports:
    - 7888:7888
    volumes:
    - ./models/kokoro:/models
    environment:
    - KOKORO_MODEL=kokoro-v0.87
    - KOKORO_VOICE=af
    restart: unless-stopped
    networks:
    - bumba-network
  livekit:
    image: livekit/livekit-server:latest
    container_name: bumba-livekit
    ports:
    - 7880:7880
    - 7881:7881
    - 50000-50100:50000-50100/udp
    volumes:
    - ./livekit/livekit.yaml:/etc/livekit.yaml
    restart: unless-stopped
    networks:
    - bumba-network
    command: --config /etc/livekit.yaml
networks:
  bumba-network:
    driver: bridge
    name: bumba-network
volumes:
  whisper-models: {}
  kokoro-models: {}
